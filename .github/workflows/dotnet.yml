name: Build & Unit Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Run Tests
    if: false # TODO: re-enable once tests are stabilised
    runs-on: ${{ matrix.os.fullname }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - { prettyname: Windows, fullname: windows-latest }
          - { prettyname: macOS, fullname: macos-latest }
          - { prettyname: Linux, fullname: ubuntu-latest }
    timeout-minutes: 60
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET 10.0.x
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Build
      run: dotnet build -c Debug

    - name: Test
      run: dotnet test $pwd/*.Tests/bin/Debug/*/*.Tests.dll --logger "trx;LogFileName=TestResults-${{ matrix.os.prettyname }}.trx"
      shell: pwsh

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: osuplayer-test-results-${{ matrix.os.prettyname }}
        path: ${{ github.workspace }}/TestResults/TestResults-${{ matrix.os.prettyname }}.trx